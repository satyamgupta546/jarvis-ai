<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060a12">
    <title>J.A.R.V.I.S</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #060a12;
            color: #c8d6e5;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(180deg, #0a1020 0%, #060a12 100%);
            padding: 18px 20px 10px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.3);
        }
        .header .sub {
            font-size: 9px;
            color: #2a4a6a;
            letter-spacing: 3px;
            margin-top: 3px;
        }

        /* ── Orb ── */
        .orb-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0 8px;
            flex-shrink: 0;
        }
        .orb {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #0d3b66, #061224);
            border: 2px solid #1a3a5c;
            transition: all 0.4s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Orb states */
        .orb.inactive {
            border-color: #1a2a3a;
            opacity: 0.5;
        }
        .orb.standby {
            border-color: #1a3a5c;
            box-shadow: 0 0 15px rgba(26, 58, 92, 0.3);
            animation: breathe 4s ease-in-out infinite;
        }
        .orb.listening {
            border-color: #4fc3f7;
            box-shadow: 0 0 50px rgba(79, 195, 247, 0.5);
            animation: pulse-blue 1.5s ease-in-out infinite;
        }
        .orb.active {
            border-color: #00e676;
            box-shadow: 0 0 40px rgba(0, 230, 118, 0.4);
            animation: pulse-green 1.5s ease-in-out infinite;
        }
        .orb.processing {
            border-color: #ffa726;
            box-shadow: 0 0 40px rgba(255, 167, 38, 0.5);
            animation: glow-orange 1s ease-in-out infinite;
        }
        .orb.speaking {
            border-color: #4fc3f7;
            box-shadow: 0 0 60px rgba(79, 195, 247, 0.6);
            animation: pulse-speak 0.6s ease-in-out infinite;
        }
        .orb.error {
            border-color: #f44336;
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.4);
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px rgba(26, 58, 92, 0.2); }
            50% { box-shadow: 0 0 25px rgba(26, 58, 92, 0.4); }
        }
        @keyframes pulse-blue {
            0%, 100% { box-shadow: 0 0 30px rgba(79, 195, 247, 0.3); }
            50% { box-shadow: 0 0 60px rgba(79, 195, 247, 0.6); }
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
            50% { box-shadow: 0 0 50px rgba(0, 230, 118, 0.5); }
        }
        @keyframes glow-orange {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 167, 38, 0.3); }
            50% { box-shadow: 0 0 55px rgba(255, 167, 38, 0.6); }
        }
        @keyframes pulse-speak {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(79, 195, 247, 0.4); }
            50% { transform: scale(1.04); box-shadow: 0 0 70px rgba(79, 195, 247, 0.7); }
        }

        .status-text {
            margin-top: 10px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #2a4a6a;
            transition: color 0.3s;
            text-align: center;
        }
        .status-text.listening { color: #4fc3f7; }
        .status-text.active { color: #00e676; }
        .status-text.processing { color: #ffa726; }
        .status-text.speaking { color: #4fc3f7; }

        /* ── Feed ── */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: slideIn 0.25s ease;
            word-wrap: break-word;
        }
        .msg.user {
            background: rgba(25, 118, 210, 0.1);
            border-left: 3px solid #1565c0;
            color: #90caf9;
        }
        .msg.jarvis {
            background: rgba(0, 230, 118, 0.05);
            border-left: 3px solid #1a3a5c;
            color: #b8d4f0;
        }
        .msg .who {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .msg.user .who { color: #42a5f5; }
        .msg.jarvis .who { color: #4fc3f7; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Start screen ── */
        .start-screen {
            position: fixed;
            inset: 0;
            background: #060a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .start-screen h1 {
            font-size: 28px;
            letter-spacing: 10px;
            color: #4fc3f7;
            margin-bottom: 8px;
        }
        .start-screen .tagline {
            font-size: 10px;
            color: #2a4a6a;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }
        .start-btn {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #0d3b66, #061224);
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 40px rgba(79, 195, 247, 0.3);
            color: #4fc3f7;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s;
        }
        .start-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 60px rgba(79, 195, 247, 0.5);
        }
        .start-hint {
            margin-top: 30px;
            font-size: 12px;
            color: #1a3a5c;
            text-align: center;
            line-height: 1.8;
        }

        /* Footer */
        .footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: #1a2a3a;
            flex-shrink: 0;
        }

        /* ── Always-On Sleep Overlay ──
           Screen goes full black after 15s idle.
           AMOLED screens = pixels off = no battery drain.
           Mic + speaker + WebSocket keep working.
           Tap or say "Hey Jarvis" to wake the display.
        */
        .sleep-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .sleep-overlay.asleep {
            opacity: 1;
            pointer-events: auto;
        }
        /* Tiny dot so user knows phone is alive */
        .sleep-overlay .sleep-dot {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px; height: 4px;
            border-radius: 50%;
            background: #0d3b66;
            animation: breathe-dot 4s ease-in-out infinite;
        }
        @keyframes breathe-dot {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- One-time start screen (needed to get mic permission) -->
    <div class="start-screen" id="startScreen">
        <h1>J.A.R.V.I.S</h1>
        <div class="tagline">WHOLE-HOME AI ASSISTANT</div>
        <button class="start-btn" id="startBtn">ACTIVATE</button>
        <div class="start-hint">
            Tap to activate mic access<br>
            Then just say <strong style="color:#4fc3f7">"Hey Jarvis"</strong>
        </div>
    </div>

    <!-- Main UI -->
    <div class="header">
        <h1>J.A.R.V.I.S</h1>
        <div class="sub">WHOLE-HOME AI ASSISTANT</div>
    </div>

    <div class="orb-wrap">
        <div class="orb inactive" id="orb"></div>
        <div class="status-text" id="statusText">INACTIVE</div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="footer">
        Say "Hey Jarvis" to begin
        <span id="voiceToggle" style="float:right; color:#4fc3f7; cursor:pointer; padding:0 8px;">Voice</span>
    </div>

    <!-- Voice Settings Panel -->
    <div id="voicePanel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#0d1520; border-top:1px solid #1a3a5c; padding:16px; z-index:150;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span style="color:#4fc3f7; font-size:13px; font-weight:600; letter-spacing:2px;">VOICE SETTINGS</span>
            <span id="voiceClose" style="color:#3a5a7a; cursor:pointer; font-size:18px;">x</span>
        </div>
        <div style="margin-bottom:10px;">
            <label style="font-size:11px; color:#3a5a7a;">Voice</label>
            <select id="voiceSelect" style="width:100%; background:#132030; border:1px solid #1a3a5c; color:#b8d4f0; padding:8px; border-radius:8px; margin-top:4px; font-size:13px;"></select>
        </div>
        <div style="display:flex; gap:12px;">
            <div style="flex:1;">
                <label style="font-size:11px; color:#3a5a7a;">Pitch: <span id="pitchVal">0.8</span></label>
                <input type="range" id="pitchRange" min="0.1" max="2" step="0.1" value="0.8" style="width:100%; accent-color:#4fc3f7;">
            </div>
            <div style="flex:1;">
                <label style="font-size:11px; color:#3a5a7a;">Speed: <span id="rateVal">0.95</span></label>
                <input type="range" id="rateRange" min="0.5" max="2" step="0.05" value="0.95" style="width:100%; accent-color:#4fc3f7;">
            </div>
        </div>
        <button id="voiceTest" style="width:100%; margin-top:10px; padding:10px; background:#132030; border:1px solid #1a3a5c; color:#4fc3f7; border-radius:8px; font-size:13px; cursor:pointer;">Test Voice</button>
    </div>

    <!-- Sleep overlay (black screen when idle — mic still works) -->
    <div class="sleep-overlay" id="sleepOverlay">
        <div class="sleep-dot"></div>
    </div>

    <script>
    (function() {
        // ── Elements ──
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const orb = document.getElementById('orb');
        const statusText = document.getElementById('statusText');
        const feed = document.getElementById('feed');

        // ── Config ──
        const WAKE_WORD = 'jarvis';
        const CONVERSATION_TIMEOUT = 10000; // 10 seconds
        const GOODBYE_WORDS = ['thank you', 'thanks', 'goodbye', 'bye', "that's all", 'stop', 'go to sleep', 'never mind'];

        // ── State ──
        let state = 'inactive'; // inactive | standby | listening | active | processing | speaking
        let ws = null;
        let recognition = null;
        let conversationTimer = null;
        let isSpeaking = false;

        // ── Status display ──
        const STATUS_MAP = {
            inactive: 'INACTIVE',
            standby: 'STANDBY — LISTENING',
            listening: 'LISTENING FOR COMMAND',
            active: 'CONVERSATION ACTIVE',
            processing: 'THINKING...',
            speaking: 'SPEAKING',
        };

        function setState(newState) {
            state = newState;
            orb.className = 'orb ' + newState;
            statusText.className = 'status-text ' + newState;
            statusText.textContent = STATUS_MAP[newState] || newState.toUpperCase();
        }

        // ── WebSocket ──
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            ws.onopen = () => console.log('WS connected');
            ws.onmessage = handleServerMessage;
            ws.onclose = () => setTimeout(connectWS, 3000);
            ws.onerror = () => ws.close();
        }

        function sendToServer(text) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'message', text }));
            }
        }

        function handleServerMessage(e) {
            const data = JSON.parse(e.data);

            if (data.type === 'connected') {
                const agentStatus = data.agent_online ? 'MacBook connected' : 'MacBook offline';
                addMessage('jarvis', `${data.bot} online. ${agentStatus}.`);
                return;
            }

            if (data.type === 'response') {
                const text = data.text;
                if (text) {
                    addMessage('jarvis', text);
                    speak(text);
                }
                // Handle commands from server
                if (data.commands) {
                    data.commands.forEach(cmd => {
                        if (cmd.type === 'play_song') {
                            addMessage('jarvis', `Playing: ${cmd.name}`);
                            window.open(cmd.url, '_blank');
                        } else if (cmd.type === 'radio') {
                            addMessage('jarvis', `Tuning in: ${cmd.name}`);
                            window.open(cmd.url, '_blank');
                        } else if (cmd.type === 'web_search') {
                            window.open(cmd.url, '_blank');
                        } else if (cmd.type === 'play_store') {
                            addMessage('jarvis', `Opening Play Store: ${cmd.app}`);
                            window.open(cmd.url, '_blank');
                        } else if (cmd.type === 'open_url') {
                            window.open(cmd.url, '_blank');
                        } else if (cmd.type === 'timer') {
                            startTimer(cmd.seconds);
                        } else if (cmd.type === 'reminder') {
                            startReminder(cmd.minutes, cmd.text);
                        }
                    });
                }
            }
        }

        // ── Speech Recognition (always-on) ──
        function startRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                setState('error');
                statusText.textContent = 'SPEECH NOT SUPPORTED';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.maxAlternatives = 1;

            recognition.onresult = handleSpeech;

            recognition.onend = () => {
                // Auto-restart unless we're speaking (to avoid feedback)
                if (!isSpeaking && state !== 'inactive') {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'no-speech' || e.error === 'aborted') return;
                console.log('Recognition error:', e.error);
            };

            recognition.start();
            setState('standby');
        }

        function handleSpeech(event) {
            // Get the latest result
            const result = event.results[event.results.length - 1];
            if (!result.isFinal) return;

            const text = result[0].transcript.trim();
            if (!text) return;

            const lower = text.toLowerCase();
            console.log(`[${state}] Heard: "${text}"`);

            if (state === 'standby') {
                // ── STANDBY: only respond to wake word ──
                const wakePos = lower.indexOf(WAKE_WORD);
                if (wakePos === -1) return; // ignore

                // Extract command after wake word
                let after = text.substring(wakePos + WAKE_WORD.length).trim();
                after = after.replace(/^[,.\s]*(hey|hello|hi|okay|ok|please)?\s*/i, '').trim();

                if (after) {
                    // Full command: "Hey Jarvis open YouTube"
                    addMessage('user', after);
                    setState('processing');
                    sendToServer(after);
                } else {
                    // Just wake word: "Hello Jarvis"
                    setState('listening');
                    speak('Yes sir?', () => {
                        setState('listening');
                    });
                }

            } else if (state === 'listening' || state === 'active') {
                // ── CONVERSATION MODE: everything is a command ──
                clearTimeout(conversationTimer);

                // Check for goodbye
                if (GOODBYE_WORDS.some(w => lower.includes(w))) {
                    speak("Going back to standby, sir.", () => setState('standby'));
                    return;
                }

                // Strip wake word if they said it again
                let command = text;
                const wp = lower.indexOf(WAKE_WORD);
                if (wp !== -1) {
                    let cleaned = text.substring(wp + WAKE_WORD.length).trim();
                    cleaned = cleaned.replace(/^[,.\s]*(hey|hello|hi|okay|ok|please)?\s*/i, '').trim();
                    if (cleaned) command = cleaned;
                }

                addMessage('user', command);
                setState('processing');
                sendToServer(command);
            }
            // Ignore speech during processing/speaking states
        }

        // ── Voice Settings ──
        let selectedVoice = null;
        let voicePitch = 0.8;
        let voiceRate = 0.95;

        const voicePanel = document.getElementById('voicePanel');
        const voiceToggle = document.getElementById('voiceToggle');
        const voiceClose = document.getElementById('voiceClose');
        const voiceSelect = document.getElementById('voiceSelect');
        const pitchRange = document.getElementById('pitchRange');
        const rateRange = document.getElementById('rateRange');
        const pitchVal = document.getElementById('pitchVal');
        const rateVal = document.getElementById('rateVal');
        const voiceTest = document.getElementById('voiceTest');

        voiceToggle.addEventListener('click', () => {
            voicePanel.style.display = voicePanel.style.display === 'none' ? 'block' : 'none';
            populateVoices();
        });
        voiceClose.addEventListener('click', () => voicePanel.style.display = 'none');

        pitchRange.addEventListener('input', () => { voicePitch = parseFloat(pitchRange.value); pitchVal.textContent = voicePitch; });
        rateRange.addEventListener('input', () => { voiceRate = parseFloat(rateRange.value); rateVal.textContent = voiceRate; });
        voiceTest.addEventListener('click', () => {
            const u = new SpeechSynthesisUtterance('All systems operational, sir. Jarvis at your service.');
            u.pitch = voicePitch;
            u.rate = voiceRate;
            if (selectedVoice) u.voice = selectedVoice;
            speechSynthesis.cancel();
            speechSynthesis.speak(u);
        });

        voiceSelect.addEventListener('change', () => {
            const voices = speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.name === voiceSelect.value) || null;
        });

        function populateVoices() {
            const voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            // English voices first
            const enVoices = voices.filter(v => v.lang.startsWith('en'));
            const otherVoices = voices.filter(v => !v.lang.startsWith('en'));
            [...enVoices, ...otherVoices].forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = `${v.name} (${v.lang})`;
                if (selectedVoice && selectedVoice.name === v.name) opt.selected = true;
                voiceSelect.appendChild(opt);
            });
        }

        function pickBestVoice() {
            const voices = speechSynthesis.getVoices();
            if (!voices.length) return;

            // Priority list for Jarvis-like deep male voice
            const preferred = [
                'Google UK English Male',
                'Daniel',
                'Google US English',
                'Microsoft David',
                'Alex',
                'Rishi',
                'english',
            ];

            for (const name of preferred) {
                const v = voices.find(v => v.name.toLowerCase().includes(name.toLowerCase()) && v.lang.startsWith('en'));
                if (v) { selectedVoice = v; return; }
            }

            // Fallback: first English voice that's not female
            selectedVoice = voices.find(v =>
                v.lang.startsWith('en') && !v.name.toLowerCase().includes('female')
            ) || voices.find(v => v.lang.startsWith('en')) || voices[0];
        }

        // Init voices
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { pickBestVoice(); populateVoices(); };
        }
        pickBestVoice();

        // ── Text-to-Speech ──
        function speak(text, onDone) {
            if (!text) { if (onDone) onDone(); return; }

            isSpeaking = true;
            setState('speaking');

            // Stop recognition while speaking to avoid feedback loop
            try { recognition.stop(); } catch(e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = voiceRate;
            utterance.pitch = voicePitch;
            utterance.volume = 1.0;

            if (selectedVoice) utterance.voice = selectedVoice;

            utterance.onend = () => {
                isSpeaking = false;

                // Enter conversation mode — stay active for follow-ups
                setState('active');
                try { recognition.start(); } catch(e) {}

                // Set timeout to go back to standby
                clearTimeout(conversationTimer);
                conversationTimer = setTimeout(() => {
                    if (state === 'active' || state === 'listening') {
                        setState('standby');
                    }
                }, CONVERSATION_TIMEOUT);

                if (onDone) onDone();
            };

            utterance.onerror = () => {
                isSpeaking = false;
                try { recognition.start(); } catch(e) {}
                if (onDone) onDone();
            };

            speechSynthesis.cancel(); // Clear queue
            speechSynthesis.speak(utterance);
        }

        // ── Chat feed ──
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const who = role === 'jarvis' ? 'Jarvis' : 'You';
            div.innerHTML = `<div class="who">${who}</div>${escapeHtml(text)}`;
            feed.appendChild(div);

            // Keep last 50 messages
            while (feed.children.length > 50) feed.removeChild(feed.firstChild);
            feed.scrollTop = feed.scrollHeight;
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML.replace(/\n/g, '<br>');
        }

        // ── Activation (one-time tap) ──
        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            connectWS();
            // Load voices (needed on some browsers)
            speechSynthesis.getVoices();
            startRecognition();
        });

        // Voices are loaded via voiceschanged event above

        // ── Timer & Reminder ──
        function startTimer(seconds) {
            const mins = Math.floor(seconds / 60);
            const label = mins > 0 ? `${mins} min` : `${seconds} sec`;
            addMessage('jarvis', `Timer set: ${label}`);

            setTimeout(() => {
                const msg = `Timer done! ${label} are up, sir.`;
                addMessage('jarvis', msg);
                speak(msg);
                playAlarm();
                // Browser notification
                if (Notification.permission === 'granted') {
                    new Notification('Jarvis Timer', { body: msg });
                }
            }, seconds * 1000);
        }

        function startReminder(minutes, text) {
            addMessage('jarvis', `Reminder set: "${text}" in ${minutes} min`);

            setTimeout(() => {
                const msg = `Reminder, sir: ${text}`;
                addMessage('jarvis', msg);
                speak(msg);
                playAlarm();
                if (Notification.permission === 'granted') {
                    new Notification('Jarvis Reminder', { body: text });
                }
            }, minutes * 60 * 1000);
        }

        function playAlarm() {
            // Generate a beep sound using Web Audio API
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.3;
                osc.start();
                // Beep pattern: beep-beep-beep
                setTimeout(() => { gain.gain.value = 0; }, 200);
                setTimeout(() => { gain.gain.value = 0.3; }, 400);
                setTimeout(() => { gain.gain.value = 0; }, 600);
                setTimeout(() => { gain.gain.value = 0.3; }, 800);
                setTimeout(() => { osc.stop(); ctx.close(); }, 1000);
            } catch(e) {}
        }

        // ── Always-On Sleep Mode ──
        // Screen goes black after 15s idle. Mic keeps listening.
        // Wakes on: tap, "Hey Jarvis", or when Jarvis speaks.
        const sleepOverlay = document.getElementById('sleepOverlay');
        const SLEEP_DELAY = 15000; // 15 seconds
        let sleepTimer = null;
        let isAsleep = false;

        function resetSleepTimer() {
            clearTimeout(sleepTimer);
            if (isAsleep) wakeDisplay();
            sleepTimer = setTimeout(goToSleep, SLEEP_DELAY);
        }

        function goToSleep() {
            if (state === 'speaking' || state === 'processing') return; // Don't sleep while active
            isAsleep = true;
            sleepOverlay.classList.add('asleep');
        }

        function wakeDisplay() {
            isAsleep = false;
            sleepOverlay.classList.remove('asleep');
            clearTimeout(sleepTimer);
            sleepTimer = setTimeout(goToSleep, SLEEP_DELAY);
        }

        // Wake on tap
        sleepOverlay.addEventListener('click', wakeDisplay);
        sleepOverlay.addEventListener('touchstart', wakeDisplay);

        // Wake when Jarvis speaks or processes
        const origSetState = setState;
        setState = function(s) {
            origSetState(s);
            if (s === 'speaking' || s === 'listening' || s === 'processing' || s === 'active') {
                resetSleepTimer();
            }
            // Go to sleep when back to standby (after delay)
            if (s === 'standby') {
                clearTimeout(sleepTimer);
                sleepTimer = setTimeout(goToSleep, SLEEP_DELAY);
            }
        };

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Keep browser tab alive — prevent phone from killing it
        // Wake Lock keeps screen "on" at OS level (browser stays active)
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => {
                    // Re-acquire if released
                    setTimeout(requestWakeLock, 1000);
                });
            } catch(e) {}
        }
        if ('wakeLock' in navigator) requestWakeLock();

        // Also keep alive with silent audio (backup for wake lock)
        function keepAliveAudio() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                gain.gain.value = 0.001; // Nearly silent
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                // Restart every 30s to prevent browser from killing it
                setInterval(() => {
                    try { osc.frequency.value = osc.frequency.value === 1 ? 2 : 1; } catch(e) {}
                }, 30000);
            } catch(e) {}
        }
        keepAliveAudio();

    })();
    </script>
</body>
